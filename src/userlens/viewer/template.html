<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,.app{height:100%}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;font-size:14px;color:#1d1d1f;background:#f5f5f7}

/* ── Layout ─────────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar{width:280px;min-width:280px;background:#1c1c1e;color:#aeaeb2;display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-size:15px;font-weight:600;color:#f5f5f7;letter-spacing:-.3px;padding:2px 0 12px;display:flex;align-items:center;gap:8px}
.logo-icon{width:20px;height:20px;flex-shrink:0}
.search{width:100%;padding:8px 12px;border-radius:20px;border:none;background:#2c2c2e;color:#f5f5f7;font-size:13px;outline:none;font-family:inherit;transition:.15s ease}
.search::placeholder{color:#6e6e73}
.search:focus{background:#3a3a3c;box-shadow:0 0 0 3px rgba(0,113,227,.35)}
.filters{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.filter-row{display:flex;align-items:center;gap:8px}
.filter-lbl{font-size:11px;color:#6e6e73;white-space:nowrap;min-width:60px;text-align:right;flex-shrink:0}
.filter-sel{flex:1;padding:5px 8px;border-radius:10px;border:none;background:#2c2c2e;color:#f5f5f7;font-size:12px;outline:none;transition:.15s ease;appearance:none;-webkit-appearance:none;cursor:pointer}
.filter-sel:focus{background:#3a3a3c;box-shadow:0 0 0 2px rgba(0,113,227,.4)}
.user-list{flex:1;overflow-y:auto;padding:4px 0}
.user-list::-webkit-scrollbar{width:4px}
.user-list::-webkit-scrollbar-track{background:transparent}
.user-list::-webkit-scrollbar-thumb{background:#3a3a3c;border-radius:2px}
.urow{padding:9px 14px 8px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s ease}
.urow:hover{background:#2c2c2e}
.urow.sel{background:#0071e3}
.urow.sel .umeta{color:rgba(255,255,255,.65)}
.urow.sel .uid{color:#fff}
.uid{font-size:12px;font-weight:600;color:#f5f5f7;font-family:ui-monospace,'SF Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.umeta{font-size:11px;color:#6e6e73;margin-top:2px}
.ibar{height:2px;background:rgba(255,255,255,.08);border-radius:1px;margin-top:5px}
.ibar-fill{height:100%;background:#0071e3;border-radius:1px;min-width:2px;transition:.15s ease}
.urow.sel .ibar{background:rgba(255,255,255,.2)}
.urow.sel .ibar-fill{background:rgba(255,255,255,.8)}
.sb-foot{padding:8px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6e6e73;flex-shrink:0}

/* ── Main ────────────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:#aeaeb2;font-size:15px;gap:10px;flex-direction:column}
.empty-icon{font-size:40px;opacity:.4}
.empty-hint{font-size:13px;color:#aeaeb2;opacity:.6}
.detail{padding:20px 24px 40px;display:none}
.hidden{display:none!important}

/* ── User card ───────────────────────────────────────────────── */
.ucard{background:#ffffff;border-radius:14px;padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05)}
.ucard-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ucard-id{font-size:17px;font-weight:700;font-family:ui-monospace,'SF Mono',monospace;color:#1d1d1f;word-break:break-all}
.copy-btn{padding:5px 13px;font-size:12px;border-radius:20px;border:none;background:#f5f5f7;color:#6e6e73;cursor:pointer;flex-shrink:0;font-family:inherit;font-weight:500;transition:.15s ease}
.copy-btn:hover{background:#e8e8ed;color:#1d1d1f}
.stats{display:flex;flex-wrap:wrap;border:1px solid #f2f2f7;border-radius:10px;overflow:hidden}
.stat{display:flex;flex-direction:column;flex:1;min-width:80px;padding:12px 16px;border-right:1px solid #f2f2f7}
.stat:last-child{border-right:none}
.stat-v{font-size:22px;font-weight:700;color:#1d1d1f;line-height:1.1;font-variant-numeric:tabular-nums}
.stat-l{font-size:10px;color:#aeaeb2;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.achips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.achip{font-size:12px;padding:4px 10px;background:#f5f5f7;color:#1d1d1f;border-radius:20px;border:1px solid #e8e8ed;font-weight:500}

/* ── Heatmap (always-visible, inside card) ───────────────────── */
.hm-section{margin-top:16px;border-top:1px solid #f5f5f7;padding-top:14px}
.hm-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:#aeaeb2;margin-bottom:10px}
.hm-wrap{overflow-x:auto;padding:2px 0 6px 0}
.hm-wrap::-webkit-scrollbar{height:3px}
.hm-wrap::-webkit-scrollbar-track{background:transparent}
.hm-wrap::-webkit-scrollbar-thumb{background:#e8e8ed;border-radius:2px}
.hm-legend{display:flex;align-items:center;flex-wrap:wrap;gap:4px 12px;margin-top:10px}
.hm-fam{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#6e6e73}
.hm-empty{color:#aeaeb2;padding:12px 0;font-size:13px}

/* ── Heatmap tooltip ─────────────────────────────────────────── */
.hm-tooltip{position:fixed;z-index:9999;background:#1c1c1e;color:#f5f5f7;border-radius:12px;padding:12px 14px;font-size:12px;min-width:180px;max-width:240px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.hm-tip-date{font-weight:700;color:#ffffff;font-size:13px;margin-bottom:3px}
.hm-tip-total{font-size:11px;color:#6e6e73;margin-bottom:8px}
.hm-tip-ev{display:flex;align-items:center;gap:6px;padding:2px 0}
.hm-tip-pill{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid transparent;flex-shrink:0}
.hm-tip-name{font-size:11px;font-family:ui-monospace,'SF Mono',monospace;color:#aeaeb2;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-tip-cnt{font-size:11px;color:#6e6e73;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── Tabs ────────────────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid #e8e8ed;margin-bottom:16px}
.tab{padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;background:none;border:none;color:#6e6e73;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:.15s ease}
.tab:hover{color:#1d1d1f}
.tab.on{color:#0071e3;border-bottom-color:#0071e3}

/* ── Timeline ────────────────────────────────────────────────── */
.sess{margin-bottom:6px;border-radius:10px;overflow:hidden;background:#ffffff;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.15s ease}
.sess:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sess summary{padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;background:#fafafa;list-style:none;transition:.15s ease}
.sess summary::-webkit-details-marker{display:none}
.sess-arrow{font-size:9px;color:#aeaeb2;transition:transform .15s;flex-shrink:0}
details[open] .sess-arrow{transform:rotate(90deg)}
.sess-date{font-size:13px;font-weight:600;color:#1d1d1f}
.sess-time{font-size:12px;color:#6e6e73;margin-left:2px}
.sess-dur{font-size:11px;color:#aeaeb2;margin-left:4px}
.sess-badge{margin-left:auto;font-size:11px;background:#f2f2f7;color:#6e6e73;padding:2px 8px;border-radius:10px;white-space:nowrap}
.sess-body{padding:4px 16px 10px}
.erow{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #fafafa}
.erow:last-child{border-bottom:none}
.etime{font-size:11px;font-family:ui-monospace,'SF Mono',monospace;color:#aeaeb2;min-width:44px;padding-top:3px;flex-shrink:0}
.ename{font-size:12px;padding:2px 8px;border-radius:5px;font-family:ui-monospace,'SF Mono',monospace;white-space:nowrap;border:1px solid transparent;line-height:1.5}
.eprops{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-left:2px}
.eprop{font-size:10px;padding:2px 6px;background:#f5f5f7;color:#6e6e73;border-radius:4px;font-family:ui-monospace,'SF Mono',monospace;border:1px solid #e8e8ed}

/* ── Timeline cap ────────────────────────────────────────────── */
.tl-cap-note{font-size:12px;color:#6e6e73;background:#fafafa;border:1px solid #f2f2f7;border-radius:8px;padding:8px 14px;margin-bottom:12px}
.tl-more{padding:4px 16px 10px}
.tl-more-btn{font-size:12px;color:#0071e3;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;font-weight:500;transition:.15s ease}
.tl-more-btn:hover{opacity:.75}

/* ── Top events table ────────────────────────────────────────── */
.top-tbl{width:100%;border-collapse:collapse;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05)}
.top-tbl th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#aeaeb2;padding:12px 16px;border-bottom:1px solid #f2f2f7;background:#fafafa}
.top-tbl td{padding:9px 16px;border-bottom:1px solid #f5f5f7;font-size:13px;vertical-align:middle;transition:.15s ease}
.top-tbl tr:last-child td{border-bottom:none}
.top-tbl tbody tr:hover td{background:#fafafa}
.top-tbl td code{font-family:ui-monospace,'SF Mono',monospace;font-size:12px;color:#1d1d1f}
.fampill{font-size:11px;padding:2px 9px;border-radius:20px;white-space:nowrap;border:1px solid transparent;font-weight:500}
.barwrap{display:flex;align-items:center;gap:8px}
.barbg{height:4px;background:#f2f2f7;border-radius:2px;width:80px;flex-shrink:0}
.barfg{height:100%;border-radius:2px;background:#0071e3;min-width:2px}
.barnum{font-size:12px;color:#6e6e73;font-variant-numeric:tabular-nums;min-width:24px}
.barpct{font-size:11px;color:#aeaeb2;font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="#0071e3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="3" fill="#0071e3" stroke="none"/>
        </svg>
        User Explorer
      </div>
      <input class="search" type="search" placeholder="Search users…" autocomplete="off" spellcheck="false">
      <div class="filters"></div>
    </div>
    <div class="user-list"></div>
    <div class="sb-foot"></div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="main">
    <div class="empty">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span>← Select a user</span>
      <span class="empty-hint">Choose a user from the sidebar to explore their activity</span>
    </div>

    <div class="detail">
      <!-- User card (includes heatmap) -->
      <div class="ucard">
        <div class="ucard-top">
          <span class="ucard-id"></span>
          <button class="copy-btn">Copy ID</button>
        </div>
        <div class="stats"></div>
        <div class="achips"></div>
        <!-- Heatmap always visible here -->
        <div class="hm-section">
          <div class="hm-title">Activity</div>
          <div id="hm-container"></div>
        </div>
      </div>

      <!-- Tabs: Timeline + Top Events only -->
      <div class="tabs">
        <button class="tab on" data-pane="pane-tl">Timeline</button>
        <button class="tab" data-pane="pane-ev">Top Events</button>
      </div>

      <div id="pane-tl"></div>
      <div id="pane-ev" class="hidden"></div>
    </div>
  </main>

</div><!-- .app -->

<!-- Floating heatmap tooltip -->
<div id="hm-tooltip" class="hm-tooltip"></div>

<!-- userlens embedded data -->
<script type="application/json" id="USERLENS_DATA">/*__USERLENS_DATA__*/</script>
<script type="application/json" id="USERLENS_META">/*__USERLENS_META__*/</script>

<script>
(function(){
'use strict';

/* ── bootstrap ─────────────────────────────────────────────── */
const DATA = JSON.parse(document.getElementById('USERLENS_DATA').textContent);
const META = JSON.parse(document.getElementById('USERLENS_META').textContent);

const maxTe = DATA.reduce((m,u)=>Math.max(m,u.te),1);
let selUid = null, searchQ = '';
const activeFilters = {};

/* ── family chip CSS (injected dynamically) ─────────────────── */
const styleEl = document.createElement('style');
styleEl.textContent = Object.entries(META.families||{}).map(([fam,f])=>
  `.fam-${CSS.escape(fam)}{background:${f.bg};color:${f.fg};border-color:${f.color}60}`
).join('');
document.head.appendChild(styleEl);

/* ── helpers ────────────────────────────────────────────────── */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pairs(arr){const r=[];for(let i=0;i+1<arr.length;i+=2)r.push([arr[i],arr[i+1]]);return r;}
function famLookup(name){
  const e=(META.topEvents||[]).find(x=>x.name===name);
  return e?e.family:'other';
}
function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha.toFixed(2)+')';
}

/* ── date formatting helpers ────────────────────────────────── */
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function formatSessionTs(ts){
  // ts may be "2025-01-15 16:11:00" or ISO "2025-01-15T16:11:00"
  const normalized=ts.replace(' ','T');
  const d=new Date(normalized);
  if(isNaN(d.getTime())) return ts; // fallback
  const mon=MONTH_NAMES[d.getMonth()];
  const day=d.getDate();
  const year=d.getFullYear();
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  return {date:`${mon} ${day}, ${year}`,time:`at ${hh}:${mm}`,raw:ts.slice(0,10)};
}

/* ── attribute filters ──────────────────────────────────────── */
const filtersDiv = document.querySelector('.filters');
const filterSelects = {};
(META.attributes||[]).forEach(attr=>{
  const row = document.createElement('div');
  row.className='filter-row';
  const lbl = document.createElement('span');
  lbl.className='filter-lbl';
  lbl.dataset.key=attr.key;
  lbl.textContent=attr.key;
  const sel = document.createElement('select');
  sel.className='filter-sel';
  sel.innerHTML=`<option value="">All</option>`+attr.values.map(v=>`<option>${esc(v)}</option>`).join('');
  sel.addEventListener('change',()=>{activeFilters[attr.key]=sel.value;renderList();});
  filterSelects[attr.key]=lbl;
  row.appendChild(lbl);row.appendChild(sel);
  filtersDiv.appendChild(row);
});

/* ── sidebar user list ──────────────────────────────────────── */
const listEl  = document.querySelector('.user-list');
const footEl  = document.querySelector('.sb-foot');

function visibleUsers(){
  return DATA.filter(u=>{
    if(searchQ && !u.u.toLowerCase().includes(searchQ)) return false;
    for(const[k,v]of Object.entries(activeFilters)){
      if(v&&(u.attrs[k]||'')!==v) return false;
    }
    return true;
  });
}

function renderList(){
  const users=visibleUsers();
  // Update filter label counts
  Object.entries(filterSelects).forEach(([key,lbl])=>{
    const fv=activeFilters[key];
    if(fv){
      const cnt=DATA.filter(u=>(u.attrs[key]||'')===(fv)).length;
      lbl.textContent=`${key} (${cnt})`;
    } else {
      lbl.textContent=key;
    }
  });
  footEl.textContent=`${users.length} users · ${DATA.reduce((s,u)=>s+u.te,0).toLocaleString()} events`;
  listEl.innerHTML=users.map(u=>`
    <div class="urow${u.u===selUid?' sel':''}" data-uid="${esc(u.u)}">
      <div class="uid">${esc(u.u)}</div>
      <div class="umeta">${u.te.toLocaleString()} events · ${u.sn} sessions</div>
      <div class="ibar"><div class="ibar-fill" style="width:${Math.max(2,Math.round(u.te/maxTe*100))}%"></div></div>
    </div>`).join('');
  listEl.querySelectorAll('.urow').forEach(el=>
    el.addEventListener('click',()=>selectUser(el.dataset.uid))
  );
}

document.querySelector('.search').addEventListener('input',e=>{
  searchQ=e.target.value.toLowerCase();renderList();
});

/* ── user selection ─────────────────────────────────────────── */
const emptyEl  = document.querySelector('.empty');
const detailEl = document.querySelector('.detail');

function selectUser(uid){
  selUid=uid;
  renderList();
  const u=DATA.find(x=>x.u===uid);
  if(!u) return;
  emptyEl.style.display='none';
  detailEl.style.display='block';
  renderCard(u);
  renderHeatmap(u);
  // clear stale hidden-event cache from previous user
  for(const k in _tlHidden) delete _tlHidden[k];
  _tlHiddenIdx=0;
  renderTimeline(u);
  renderTopEvents(u);
  switchTab('pane-tl');
}

/* ── user card ──────────────────────────────────────────────── */
function renderCard(u){
  detailEl.querySelector('.ucard-id').textContent=u.u;
  detailEl.querySelector('.stats').innerHTML=[
    [u.te.toLocaleString(),'events'],
    [u.sn,'sessions'],
    [u.fs.slice(0,10),'first seen'],
    [u.ls.slice(0,10),'last seen'],
  ].map(([v,l])=>`<div class="stat"><span class="stat-v">${v}</span><span class="stat-l">${l}</span></div>`).join('');
  detailEl.querySelector('.achips').innerHTML=Object.entries(u.attrs||{}).map(
    ([k,v])=>`<span class="achip">${esc(k)}: ${esc(v)}</span>`
  ).join('');
}

const copyBtn = detailEl.querySelector('.copy-btn');
copyBtn.addEventListener('click',()=>{
  if(!selUid) return;
  navigator.clipboard.writeText(selUid).then(()=>{
    copyBtn.textContent='Copied!';
    setTimeout(()=>{copyBtn.textContent='Copy ID';},1500);
  }).catch(()=>{});
});

/* ── timeline ───────────────────────────────────────────────── */
const TL_CAP=500; // max events rendered before "show all" expander
const _tlHidden={}; // key → pre-rendered HTML for hidden events
let _tlHiddenIdx=0;

function renderEventRow(ev){
  const[hhmm,name,fam,...props]=ev;
  const propsHtml=pairs(props).map(([k,v])=>`<span class="eprop">${esc(k)}=${esc(v)}</span>`).join('');
  return `<div class="erow"><span class="etime">${esc(hhmm)}</span><span class="ename fam-${CSS.escape(fam)}">${esc(name)}</span>${propsHtml?`<span class="eprops">${propsHtml}</span>`:''}</div>`;
}

// Event delegation: one listener handles all "show more" clicks regardless of IIFE scope
document.addEventListener('click',function(e){
  const btn=e.target.closest('.tl-more-btn');
  if(!btn) return;
  const key=btn.dataset.key;
  const html=_tlHidden[key]||'';
  delete _tlHidden[key];
  const more=btn.closest('.tl-more');
  more.previousElementSibling.insertAdjacentHTML('beforeend',html);
  more.remove();
});

function renderTimeline(u){
  // Count total events to decide whether to cap
  const total=u.s.reduce((n,[,,evs])=>n+evs.length,0);
  let rendered=0;
  const html=u.s.map(([sid,ts,evs])=>{
    if(rendered>=TL_CAP) return '';
    const canShow=Math.max(0,TL_CAP-rendered);
    const visible=evs.slice(0,canShow);
    const hidden=evs.slice(canShow);
    rendered+=visible.length;

    // Format timestamp
    const fmt=formatSessionTs(ts);
    const dateLabel=fmt.date||ts.slice(0,10);
    const timeLabel=fmt.time||'';
    const rawDate=fmt.raw||ts.slice(0,10);

    let hiddenHtml='';
    if(hidden.length){
      const key='tlh'+(++_tlHiddenIdx);
      _tlHidden[key]=hidden.map(renderEventRow).join('');
      hiddenHtml=`<div class="tl-more"><button class="tl-more-btn" data-key="${key}">↓ Show ${hidden.length} more event${hidden.length!==1?'s':''} in this session</button></div>`;
    }
    return `<details class="sess" open>
      <summary><span class="sess-arrow">▶</span><span class="sess-date" data-rawdate="${esc(rawDate)}">${esc(dateLabel)}</span><span class="sess-time">${esc(timeLabel)}</span><span class="sess-badge">${evs.length} event${evs.length!==1?'s':''}</span></summary>
      <div class="sess-body">${visible.map(renderEventRow).join('')}</div>${hiddenHtml}
    </details>`;
  }).join('');

  const capNote=total>TL_CAP
    ? `<div class="tl-cap-note">Showing first ${TL_CAP} of ${total.toLocaleString()} events. Click "Show more" in each session to expand.</div>`
    : '';
  document.getElementById('pane-tl').innerHTML=capNote+html;
}

/* ── top events ─────────────────────────────────────────────── */
function renderTopEvents(u){
  const counts={};
  u.s.forEach(([,,evs])=>evs.forEach(([,n])=>counts[n]=(counts[n]||0)+1));
  const rows=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const maxC=rows[0]?.[1]||1;
  const totalEvs=rows.reduce((s,[,c])=>s+c,0)||1;
  document.getElementById('pane-ev').innerHTML=`<table class="top-tbl">
    <thead><tr><th>Event</th><th>Family</th><th>Count</th><th>%</th></tr></thead>
    <tbody>${rows.map(([n,cnt])=>{
      const fam=famLookup(n);
      const pct=Math.round(cnt/totalEvs*100);
      return `<tr>
        <td><code>${esc(n)}</code></td>
        <td><span class="fampill fam-${CSS.escape(fam)}">${esc(fam)}</span></td>
        <td><div class="barwrap"><div class="barbg"><div class="barfg" style="width:${Math.round(cnt/maxC*100)}%"></div></div><span class="barnum">${cnt}</span></div></td>
        <td><span class="barpct">${pct}%</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

/* ── heatmap ────────────────────────────────────────────────── */
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['S','M','T','W','T','F','S'];

function renderHeatmap(u){
  const container=document.getElementById('hm-container');

  // Build per-day data
  const dayData={};
  u.s.forEach(([,ts,evs])=>{
    const d=ts.slice(0,10);
    if(!dayData[d]) dayData[d]={total:0,famCounts:{},evCounts:{}};
    evs.forEach(([hhmm,name,fam])=>{
      dayData[d].total++;
      dayData[d].famCounts[fam]=(dayData[d].famCounts[fam]||0)+1;
      if(!dayData[d].evCounts[name]) dayData[d].evCounts[name]={fam,cnt:0};
      dayData[d].evCounts[name].cnt++;
    });
  });

  // Precompute dominant family + sorted top events per day
  Object.values(dayData).forEach(day=>{
    day.domFamily=Object.entries(day.famCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'other';
    day.topEvs=Object.entries(day.evCounts)
      .map(([name,info])=>({name,fam:info.fam,cnt:info.cnt}))
      .sort((a,b)=>b.cnt-a.cnt)
      .slice(0,6);
  });

  const days=Object.keys(dayData).sort();
  if(!days.length){container.innerHTML='<p class="hm-empty">No activity data</p>';return;}

  const maxC=Math.max(...Object.values(dayData).map(d=>d.total),1);

  // Build week grid (Sun–Sat)
  const t0=new Date(days[0]+'T12:00:00');
  const t1=new Date(days[days.length-1]+'T12:00:00');
  const start=new Date(t0);start.setDate(start.getDate()-start.getDay());
  const end=new Date(t1);end.setDate(end.getDate()+(6-end.getDay()));

  const CELL=13,GAP=3,OFF_X=24,OFF_Y=20;
  const weeks=[];
  const cur=new Date(start);
  while(cur<=end){
    const week=[];
    for(let d=0;d<7;d++){
      const key=cur.toISOString().slice(0,10);
      const info=dayData[key];
      week.push({date:key,total:info?info.total:0,domFamily:info?info.domFamily:null,month:cur.getMonth()});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }

  // Cell fill: dominant family color, opacity scales with event volume
  function cellFill(total,domFamily){
    if(!total) return '#f5f5f7';
    const f=META.families[domFamily]||{color:'#0071e3'};
    const ratio=total/maxC;
    // gamma-correct so low-activity days still have visible color
    const alpha=0.18+0.82*Math.pow(ratio,0.55);
    return hexToRgba(f.color,alpha);
  }

  // Month labels (skip if same as previous)
  let lastM=-1;
  const mlabels=weeks.map((w,wi)=>{
    const m=w[0].month;
    if(m===lastM) return '';
    lastM=m;
    return `<text x="${OFF_X+wi*(CELL+GAP)}" y="12" fill="#aeaeb2" font-size="10">${MONTHS[m]}</text>`;
  }).join('');

  // Day labels — M, W, F only
  const dlabels=DAYS.map((l,i)=>
    (i===1||i===3||i===5)?`<text x="${OFF_X-4}" y="${OFF_Y+i*(CELL+GAP)+CELL-1}" fill="#aeaeb2" font-size="10" text-anchor="end">${l}</text>`:''
  ).join('');

  // Cells — store data-date for tooltip + click
  const cells=weeks.map((w,wi)=>w.map(({date,total,domFamily},di)=>{
    const x=OFF_X+wi*(CELL+GAP), y=OFF_Y+di*(CELL+GAP);
    const fill=cellFill(total,domFamily);
    const cur=total>0?'pointer':'default';
    return `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="2" fill="${fill}" data-date="${date}" style="cursor:${cur}"/>`;
  }).join('')).join('');

  const W=OFF_X+weeks.length*(CELL+GAP)+4;
  const H=OFF_Y+7*(CELL+GAP)+4;

  // Family legend — show families that actually appear in this user's data
  const usedFams=new Set(Object.values(dayData).map(d=>d.domFamily));
  const legendHtml=Object.entries(META.families)
    .filter(([fam])=>usedFams.has(fam)&&fam!=='other')
    .map(([fam,f])=>`<span class="hm-fam"><svg width="10" height="10" style="flex-shrink:0"><rect width="10" height="10" rx="2" fill="${f.color}"/></svg>${esc(fam)}</span>`)
    .join('');

  container.innerHTML=`
    <div class="hm-wrap">
      <svg id="hm-svg" width="${W}" height="${H}" style="display:block">${mlabels}${dlabels}${cells}</svg>
    </div>
    <div class="hm-legend">${legendHtml}</div>`;

  // ── Tooltip ──────────────────────────────────────────────────
  const tooltip=document.getElementById('hm-tooltip');
  const svgEl=document.getElementById('hm-svg');
  let tipTarget=null;

  svgEl.addEventListener('mouseover',e=>{
    const rect=e.target.closest?e.target.closest('rect[data-date]'):null;
    if(!rect||rect===tipTarget) return;
    tipTarget=rect;
    const date=rect.dataset.date;
    const info=dayData[date];
    if(!info){tooltip.style.display='none';return;}

    // Format date for tooltip
    const dp=date.split('-');
    const tipDateStr=`${MONTHS[parseInt(dp[1])-1]} ${parseInt(dp[2])}, ${dp[0]}`;

    const evRows=info.topEvs.map(({name,fam,cnt})=>{
      const f=META.families[fam]||{};
      return `<div class="hm-tip-ev">
        <span class="hm-tip-pill" style="background:${f.bg||'#2c2c2e'};color:${f.fg||'#f5f5f7'};border-color:${(f.color||'#6e6e73')+'60'}">${esc(fam)}</span>
        <span class="hm-tip-name">${esc(name)}</span>
        <span class="hm-tip-cnt">${cnt}</span>
      </div>`;
    }).join('');

    tooltip.innerHTML=
      `<div class="hm-tip-date">${tipDateStr}</div>`+
      `<div class="hm-tip-total">${info.total} event${info.total!==1?'s':''}</div>`+
      evRows;
    tooltip.style.display='block';
  });

  svgEl.addEventListener('mousemove',e=>{
    if(tooltip.style.display==='none') return;
    const x=e.clientX+16, y=e.clientY-10;
    const tw=tooltip.offsetWidth, th=tooltip.offsetHeight;
    tooltip.style.left=(x+tw>window.innerWidth-8?e.clientX-tw-16:x)+'px';
    tooltip.style.top=(y+th>window.innerHeight-8?e.clientY-th-10:y)+'px';
  });

  svgEl.addEventListener('mouseleave',()=>{
    tooltip.style.display='none';
    tipTarget=null;
  });

  // ── Click → jump to that date in timeline ────────────────────
  svgEl.addEventListener('click',e=>{
    const rect=e.target.closest?e.target.closest('rect[data-date]'):null;
    if(!rect||!dayData[rect.dataset.date]) return;
    tooltip.style.display='none';
    const date=rect.dataset.date;
    switchTab('pane-tl');
    // Find first session starting on this date (look at data-rawdate)
    requestAnimationFrame(()=>{
      const stamps=document.querySelectorAll('#pane-tl .sess-date[data-rawdate]');
      for(const el of stamps){
        if(el.dataset.rawdate===date){
          el.closest('.sess').scrollIntoView({behavior:'smooth',block:'start'});
          // Briefly highlight
          const sess=el.closest('.sess');
          sess.style.outline='2px solid #0071e3';
          setTimeout(()=>{sess.style.outline='';},1200);
          break;
        }
      }
    });
  });
}

/* ── tab switching ──────────────────────────────────────────── */
function switchTab(paneId){
  detailEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.pane===paneId));
  ['pane-tl','pane-ev'].forEach(id=>{
    document.getElementById(id).classList.toggle('hidden',id!==paneId);
  });
}
detailEl.querySelector('.tabs').addEventListener('click',e=>{
  if(e.target.classList.contains('tab')) switchTab(e.target.dataset.pane);
});

/* ── init ───────────────────────────────────────────────────── */
renderList();
if(DATA.length>0) selectUser(DATA[0].u);

})();
</script>
</body>
</html>
