name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: test / py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,parquet]"

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Type check (mypy)
        run: mypy src/userlens

      - name: Run tests
        run: pytest

      - name: Smoke test — quiet mode
        run: |
          python -m userlens tests/fixtures/tiny.csv --no-open --quiet | python -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          assert d['users'] == 3, f'expected 3 users, got {d[\"users\"]}'
          assert d['events'] == 20, f'expected 20 events, got {d[\"events\"]}'
          print('smoke test passed')
          "
