<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Explorer</title>
<style>
/* ── Palette ── */
[data-theme=light]{
  --bg:#f7f7f9;--panel:#fff;--card:#fff;--card-2:#f4f4f7;
  --sb:#101013;
  --border:#e4e4ea;--border-soft:#eef0f4;
  --text:#15151a;--text-2:#4a4a55;--text-3:#8e8e9c;
  --accent:#5E6AD2;--accent-hi:#4D58B8;--accent-bg:rgba(94,106,210,.10);
  --mono-warm:#b07900;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --shadow:0 1px 2px rgba(20,20,30,.04),0 0 0 1px rgba(20,20,30,.04);
  --shadow-md:0 4px 14px rgba(20,20,30,.06),0 0 0 1px rgba(20,20,30,.05);
  --empty-cell:#eaeaee;
}
[data-theme=dark]{
  --bg:#0c0c0e;--panel:#101013;--card:#16161a;--card-2:#1a1a20;
  --sb:#08080a;
  --border:#26262e;--border-soft:#1d1d23;
  --text:#e6e6ea;--text-2:#a0a0aa;--text-3:#6e6e7a;
  --accent:#5E6AD2;--accent-hi:#7B86E8;--accent-bg:rgba(94,106,210,.14);
  --mono-warm:#f0c674;--ok:#4ade80;--warn:#fbbf24;--err:#ef4444;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
  --empty-cell:#1a1a20;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,.app{height:100%}
body{
  font-family:-apple-system,'Inter','SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif;
  font-size:13px;line-height:1.45;color:var(--text);background:var(--bg);
  -webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;
}
:root{--mono:ui-monospace,'JetBrains Mono','SF Mono',Menlo,Consolas,monospace}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar (always dark — Linear rails feel) ── */
.sidebar{
  width:284px;min-width:284px;background:var(--sb);
  display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid rgba(255,255,255,.06);
  color:#a0a0aa;
}
.sb-head{padding:12px 12px 8px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.logo{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo-name{
  font-size:13px;font-weight:600;color:#e6e6ea;
  letter-spacing:-.1px;display:flex;align-items:center;gap:7px;
}
.logo-icon{width:16px;height:16px;flex-shrink:0}
.theme-btn{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);border:none;border-radius:6px;
  color:#a0a0aa;cursor:pointer;transition:.12s ease;flex-shrink:0;
}
.theme-btn:hover{background:rgba(255,255,255,.12);color:#fff}

.search-wrap{position:relative}
.search-icon{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:#6e6e7a;
}
.search{
  width:100%;padding:6px 10px 6px 28px;border-radius:6px;border:none;
  background:rgba(255,255,255,.06);color:#e6e6ea;
  font-size:12px;font-family:var(--mono);outline:none;transition:.12s ease;
}
.search::placeholder{color:#6e6e7a;font-family:inherit}
.search:focus{background:rgba(255,255,255,.1);box-shadow:0 0 0 1px var(--accent)}

.sb-controls{display:flex;gap:5px;margin-top:6px}
.sort-sel{
  flex:1;padding:4px 7px;border-radius:6px;border:none;
  background:rgba(255,255,255,.06);color:#a0a0aa;
  font-size:11px;outline:none;font-family:inherit;cursor:pointer;
  appearance:none;-webkit-appearance:none;transition:.12s ease;
}
.sort-sel:focus{background:rgba(255,255,255,.1)}

.filters{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.filter-row{display:flex;align-items:center;gap:5px}
.filter-lbl{
  font-size:10px;color:#6e6e7a;white-space:nowrap;
  min-width:50px;text-align:right;flex-shrink:0;
  text-transform:uppercase;letter-spacing:.4px;
}
.filter-sel{
  flex:1;padding:3px 7px;border-radius:6px;border:none;
  background:rgba(255,255,255,.06);color:#e6e6ea;
  font-size:11px;outline:none;transition:.12s ease;
  appearance:none;-webkit-appearance:none;cursor:pointer;
}
.filter-sel:focus{background:rgba(255,255,255,.1)}

.active-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.achip-filter{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;padding:1px 6px;
  background:var(--accent-bg);color:var(--accent-hi);
  border:1px solid rgba(94,106,210,.3);border-radius:4px;
  cursor:pointer;transition:.12s ease;font-family:var(--mono);
}
.achip-filter:hover{background:rgba(94,106,210,.25)}
.achip-x{font-size:12px;opacity:.7;line-height:1}

.user-list{flex:1;overflow-y:auto;padding:2px 0}
.user-list::-webkit-scrollbar{width:3px}
.user-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.urow{
  padding:7px 12px 6px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .1s ease;
}
.urow:hover{background:rgba(255,255,255,.05)}
.urow.sel{background:var(--accent-bg);border-left:2px solid var(--accent);padding-left:10px}
.urow.sel .uid{color:#fff}
.uid{
  font-size:12px;font-weight:600;color:#e6e6ea;
  font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.umeta{font-size:10px;color:#6e6e7a;margin-top:1px;font-family:var(--mono)}
.uattrs{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.uattr{
  font-size:9px;padding:1px 5px;
  background:rgba(255,255,255,.06);border-radius:3px;
  color:#a0a0aa;text-transform:uppercase;letter-spacing:.3px;
}
.ibar{height:1px;background:rgba(255,255,255,.06);margin-top:4px}
.ibar-fill{height:100%;background:var(--accent);min-width:2px}
.urow.sel .ibar{background:rgba(255,255,255,.15)}
.urow.sel .ibar-fill{background:var(--accent-hi)}

.sb-foot{
  padding:7px 12px;border-top:1px solid rgba(255,255,255,.05);
  font-size:10px;color:#6e6e7a;flex-shrink:0;
  display:flex;justify-content:space-between;font-family:var(--mono);
}

/* ── Main ── */
.main{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;
  background:var(--bg);
}

.empty{flex:1;display:flex;align-items:center;justify-content:center}
.empty-inner{text-align:center}
.empty-icon{margin-bottom:10px;opacity:.18;color:var(--text)}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.empty-hint{font-size:12px;color:var(--text-3)}
.empty-kbd{
  display:inline-block;font-size:10px;color:var(--text-3);
  margin-top:8px;background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:2px 7px;font-family:var(--mono);
}
.empty-stats{
  display:flex;gap:32px;justify-content:center;
  margin-top:22px;padding-top:22px;border-top:1px solid var(--border-soft);
}
.estat{text-align:center}
.estat-v{font-size:24px;font-weight:700;color:var(--text);font-family:var(--mono)}
.estat-l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

.detail{padding:16px 20px 40px;display:none}
.hidden{display:none!important}

/* ── User card ── */
.ucard{
  background:var(--card);border-radius:8px;
  padding:14px 16px;margin-bottom:12px;
  box-shadow:var(--shadow);border:1px solid var(--border-soft);
}
.ucard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.ucard-id-wrap{min-width:0}
.ucard-id{
  font-size:16px;font-weight:600;font-family:var(--mono);
  color:var(--text);word-break:break-all;line-height:1.2;
}
.ucard-rel{font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--mono)}
.copy-btn{
  padding:5px 12px;font-size:11px;border-radius:5px;
  border:1px solid var(--border);background:var(--card-2);
  color:var(--text-2);cursor:pointer;flex-shrink:0;
  font-family:var(--mono);transition:.12s ease;
}
.copy-btn:hover{background:var(--border);color:var(--text)}
.copy-btn.copied{background:rgba(22,163,74,.15);border-color:var(--ok);color:var(--ok)}

.stats{
  display:flex;border:1px solid var(--border-soft);border-radius:6px;
  overflow:hidden;background:var(--card-2);
}
.stat{
  display:flex;flex-direction:column;flex:1;min-width:0;
  padding:8px 12px;border-right:1px solid var(--border-soft);
}
.stat:last-child{border-right:none}
.stat-v{
  font-size:18px;font-weight:700;color:var(--text);
  font-family:var(--mono);line-height:1.1;
}
.stat-l{
  font-size:9px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.7px;margin-top:3px;
}

.achips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.achip{
  font-size:11px;padding:3px 8px;background:var(--card-2);
  color:var(--text);border-radius:4px;border:1px solid var(--border-soft);
  font-family:var(--mono);
}
.achip-key{color:var(--text-3);font-weight:400}

/* ── Time-range filter ── */
.range-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 0 4px;
  border-top:1px solid var(--border-soft);
  margin-top:12px;
}
.range-bar-lbl{
  font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.7px;color:var(--text-3);
}
.range-presets{display:flex;gap:3px}
.range-btn{
  font-size:11px;padding:3px 10px;border-radius:5px;
  background:var(--card-2);border:1px solid var(--border-soft);
  color:var(--text-2);cursor:pointer;font-family:var(--mono);
  transition:.12s ease;
}
.range-btn:hover{background:var(--border);color:var(--text)}
.range-btn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.range-custom{display:flex;align-items:center;gap:5px}
.range-custom input{
  font-size:11px;padding:3px 8px;border-radius:5px;
  background:var(--card-2);border:1px solid var(--border-soft);
  color:var(--text);font-family:var(--mono);outline:none;
  color-scheme:light;
}
[data-theme=dark] .range-custom input{color-scheme:dark}
.range-custom input:focus{border-color:var(--accent)}
.range-sep{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.range-summary{
  margin-left:auto;font-size:11px;color:var(--text-2);
  font-family:var(--mono);
}
.range-summary b{color:var(--text);font-weight:600}

/* ── Heatmap section ── */
.hm-section{margin-top:14px;border-top:1px solid var(--border-soft);padding-top:12px}
.hm-title{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.7px;color:var(--text-3);margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.hm-mode{
  font-size:10px;color:var(--text-3);font-family:var(--mono);
  text-transform:none;letter-spacing:0;
}
.hm-mode b{color:var(--accent);font-weight:600}
.hm-wrap{overflow-x:auto;padding-bottom:3px}
.hm-wrap::-webkit-scrollbar{height:3px}
.hm-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Event-name legend chips (heatmap filter) ── */
.evchips{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:9px}
.evchip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;padding:3px 7px 3px 5px;border-radius:14px;
  border:1px solid var(--border);background:var(--card);
  cursor:pointer;font-family:var(--mono);transition:.1s ease;
  color:var(--text);
}
.evchip:hover{background:var(--card-2)}
.evchip.solo{
  background:var(--accent-bg);border-color:var(--accent);
  color:var(--accent);
}
[data-theme=dark] .evchip.solo{color:var(--accent-hi)}
.evchip-sw{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.evchip-cnt{color:var(--text-3);font-size:10px}
.evchip-x{
  width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-3);border-radius:50%;
  margin-left:1px;line-height:1;
}
.evchip-x:hover{background:var(--border);color:var(--err)}
.evchip-restore{
  font-size:10px;padding:2px 9px;border-radius:14px;
  background:var(--card-2);border:1px dashed var(--border);
  color:var(--text-3);cursor:pointer;font-family:var(--mono);
  transition:.1s ease;
}
.evchip-restore:hover{color:var(--accent);border-color:var(--accent)}
.hm-empty{color:var(--text-3);padding:6px 0;font-size:12px}

/* ── Tooltip ── */
.tip{
  position:fixed;z-index:9999;
  background:var(--card);color:var(--text);
  border-radius:8px;padding:9px 11px;font-size:11px;
  min-width:200px;max-width:300px;
  box-shadow:0 12px 28px rgba(0,0,0,.18),0 0 0 1px var(--border);
  display:none;
  pointer-events:auto;
  border:1px solid var(--border);
}
[data-theme=dark] .tip{
  background:#16161a;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
  border-color:rgba(255,255,255,.1);
}
.tip-h{font-weight:600;color:var(--text);font-size:12px;margin-bottom:2px;font-family:var(--mono)}
.tip-sub{font-size:10px;color:var(--text-3);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);font-family:var(--mono)}
.tip-row{display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:4px}
.tip-pill{font-size:9px;padding:1px 6px;border-radius:9px;border:1px solid transparent;flex-shrink:0;font-family:var(--mono)}
.tip-name{font-size:11px;font-family:var(--mono);color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tip-cnt{font-size:10px;color:var(--text-3);flex-shrink:0;font-family:var(--mono)}
button.tip-row{
  background:none;border:none;width:100%;text-align:left;cursor:pointer;
  transition:.1s ease;
}
button.tip-row:hover{background:var(--accent-bg)}
button.tip-row:hover .tip-name{color:var(--accent)}
.tip-hint{font-size:9px;color:var(--text-3);margin-top:5px;padding-top:5px;border-top:1px solid var(--border-soft);font-family:var(--mono);text-align:center}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:2px;position:sticky;top:0;background:var(--bg);z-index:6}
.tab{
  padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;
  background:none;border:none;color:var(--text-3);
  border-bottom:1px solid transparent;margin-bottom:-1px;
  font-family:inherit;transition:.12s ease;letter-spacing:.1px;
}
.tab:hover{color:var(--text)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Timeline ── */
.tl-toolbar{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.tl-search-wrap{position:relative;flex:1;max-width:340px}
.tl-search-icon{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--text-3);
}
.tl-search{
  width:100%;padding:5px 10px 5px 28px;border-radius:6px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:12px;font-family:var(--mono);
  outline:none;transition:.12s ease;
}
.tl-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.tl-search-stats{font-size:11px;color:var(--text-3);font-family:var(--mono)}

.sess{
  margin-bottom:5px;border-radius:6px;overflow:hidden;
  background:var(--card);box-shadow:var(--shadow);
  border:1px solid var(--border-soft);transition:.12s ease;
}
.sess:hover{border-color:var(--border)}
.sess[open]>summary{
  position:sticky;top:38px;z-index:4;background:var(--card);
  border-bottom:1px solid var(--border-soft);
}
.sess summary{
  padding:8px 14px;display:flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;list-style:none;transition:.12s ease;
}
.sess summary::-webkit-details-marker{display:none}
.sess summary:hover{background:var(--card-2)}
.sess-arrow{font-size:8px;color:var(--text-3);transition:transform .12s;flex-shrink:0}
details[open] .sess-arrow{transform:rotate(90deg)}
.sess-date{font-size:12px;font-weight:600;color:var(--text);font-family:var(--mono)}
.sess-time{font-size:11px;color:var(--text-2);margin-left:2px;font-family:var(--mono)}
.sess-dur{
  font-size:10px;color:var(--text-3);
  background:var(--card-2);padding:1px 6px;border-radius:3px;
  border:1px solid var(--border-soft);font-family:var(--mono);
}
.sess-badges{display:flex;gap:3px;align-items:center}
.sess-badge-mk{
  width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;border-radius:4px;line-height:1;
}
.sess-badge-mk[data-kind=err]{background:rgba(220,38,38,.12);color:var(--err)}
.sess-badge-mk[data-kind=long]{background:rgba(217,119,6,.12);color:var(--warn)}
.sess-badge-mk[data-kind=loop]{background:rgba(94,106,210,.12);color:var(--accent)}
.sess-badge{
  margin-left:auto;font-size:10px;background:var(--card-2);
  color:var(--text-2);padding:1px 7px;border-radius:9px;
  white-space:nowrap;font-family:var(--mono);border:1px solid var(--border-soft);
}
.sess-body{padding:2px 14px 8px}
.erow{
  display:flex;align-items:flex-start;gap:8px;
  padding:4px 0;border-bottom:1px solid var(--border-soft);
  transition:.1s ease;
}
.erow:last-child{border-bottom:none}
.erow.hl-ev{background:rgba(94,106,210,.13)!important;border-left:3px solid var(--accent)!important;border-radius:0 4px 4px 0;padding-left:5px;}
[data-theme=dark] .erow.hl-ev{background:rgba(94,106,210,.22)!important;}
.erow.match{background:var(--accent-bg);border-radius:4px;padding-left:6px;margin-left:-6px;margin-right:-6px;padding-right:6px}
.erow.dim{opacity:.3}
.etime{
  font-size:10px;font-family:var(--mono);color:var(--text-3);
  min-width:42px;padding-top:2px;flex-shrink:0;
}
.ename{
  font-size:11px;padding:1px 7px;border-radius:3px;
  font-family:var(--mono);white-space:nowrap;
  border:1px solid transparent;line-height:1.5;
}
.eprops{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-left:2px}
.eprop{
  font-size:10px;padding:1px 5px;background:var(--card-2);
  color:var(--text-2);border-radius:3px;font-family:var(--mono);
  border:1px solid var(--border-soft);
}
.erow.highlight{
  outline:2px solid var(--accent);outline-offset:1px;
  border-radius:4px;
}
.tl-cap-note{
  font-size:11px;color:var(--text-2);background:var(--card);
  border:1px solid var(--border);border-radius:6px;
  padding:7px 13px;margin-bottom:10px;font-family:var(--mono);
}
.tl-more{padding:3px 14px 8px}
.tl-more-btn{
  font-size:11px;color:var(--accent);background:none;border:none;
  cursor:pointer;padding:0;font-family:inherit;font-weight:500;transition:.12s ease;
}
.tl-more-btn:hover{color:var(--accent-hi)}

/* ── Top events table ── */
.top-tbl{
  width:100%;border-collapse:collapse;background:var(--card);
  border-radius:8px;overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--border-soft);
}
.top-tbl th{
  text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text-3);
  padding:9px 14px;border-bottom:1px solid var(--border);background:var(--card-2);
}
.top-tbl td{
  padding:7px 14px;border-bottom:1px solid var(--border-soft);
  font-size:12px;vertical-align:middle;transition:.12s ease;
}
.top-tbl tr:last-child td{border-bottom:none}
.top-tbl tbody tr:hover td{background:var(--card-2)}
.top-tbl td code{font-family:var(--mono);font-size:11px;color:var(--text)}
.fampill{
  font-size:10px;padding:1px 8px;border-radius:9px;
  white-space:nowrap;border:1px solid transparent;font-weight:500;
  font-family:var(--mono);
}
.barwrap{display:flex;align-items:center;gap:7px}
.barbg{height:3px;background:var(--border);border-radius:1px;width:80px;flex-shrink:0}
.barfg{height:100%;border-radius:1px;background:var(--accent);min-width:2px}
.barnum{font-size:11px;color:var(--text-2);font-family:var(--mono);min-width:24px}
.barpct{font-size:10px;color:var(--text-3);font-family:var(--mono);min-width:32px;text-align:right}

/* ── Sessions tab — DoW × Hour grid + trend + histogram ── */
.sx-grid{display:grid;grid-template-columns:1fr;gap:12px}
.sx-card{
  background:var(--card);border:1px solid var(--border-soft);
  border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);
}
.sx-h{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:10px;gap:8px;
}
.sx-title{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.sx-sub{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.sx-dow-wrap{display:flex;flex-direction:column;gap:2px;overflow-x:auto;padding-bottom:3px}
.sx-dow-axis{
  display:flex;font-size:9px;color:var(--text-3);font-family:var(--mono);
  margin-left:32px;
}
.sx-dow-row{display:flex;align-items:center;gap:6px}
.sx-dow-lbl{
  font-size:10px;color:var(--text-3);font-family:var(--mono);
  width:28px;flex-shrink:0;text-align:right;
}
.sx-dow-cells{display:flex;gap:2px}
.sx-dow-cell{
  width:18px;height:14px;border-radius:2px;
  background:var(--empty-cell);
  display:inline-block;
  cursor:default;
}
.sx-dow-cell[data-cnt]{cursor:pointer}
.sx-dow-axis-cell{width:18px;text-align:center;flex-shrink:0;line-height:1;padding:2px 0}
.sx-stacked{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:980px){.sx-stacked{grid-template-columns:1fr}}
.sx-trend{height:140px;width:100%}
.sx-trend-axis{font-size:9px;fill:var(--text-3);font-family:var(--mono)}
.sx-trend-grid{stroke:var(--border-soft);stroke-width:1}
.sx-trend-line{stroke:var(--accent);stroke-width:1.5;fill:none}
.sx-trend-area{fill:var(--accent);opacity:.07}
.sx-trend-dot{fill:var(--accent);cursor:pointer}
.sx-trend-dot:hover{r:4}
.sx-hist{display:flex;flex-direction:column;gap:5px}
.sx-hist-row{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono)}
.sx-hist-lbl{width:48px;color:var(--text-3);font-size:10px}
.sx-hist-bar{flex:1;height:10px;background:var(--card-2);border-radius:3px;overflow:hidden;border:1px solid var(--border-soft)}
.sx-hist-fg{height:100%;background:var(--accent);border-radius:2px;min-width:2px}
.sx-hist-cnt{width:28px;text-align:right;color:var(--text-2);font-size:10px}
.sx-summary{
  font-size:10px;color:var(--text-3);font-family:var(--mono);
  margin-top:8px;padding-top:7px;border-top:1px solid var(--border-soft);
}
.sx-summary b{color:var(--text);font-weight:600}
.sx-empty{color:var(--text-3);padding:24px;text-align:center;font-size:12px}

/* ── Flow tab — single panel of session paths ── */
.fp-head{
  font-size:11px;color:var(--text-2);font-family:var(--mono);
  margin-bottom:10px;
}
.fp-head b{color:var(--text);font-weight:600}
.fp-panel{
  background:var(--card);border:1px solid var(--border-soft);
  border-radius:8px;padding:6px 0;box-shadow:var(--shadow);
}
.fp-row{
  border-bottom:1px solid var(--border-soft);
  transition:.12s ease;
}
.fp-row:last-child{border-bottom:none}
.fp-row-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;cursor:pointer;
  transition:.1s ease;
}
.fp-row-head:hover{background:var(--card-2)}
.fp-row.open .fp-row-head{background:var(--card-2);border-bottom:1px solid var(--border-soft)}
.fp-chain{display:flex;align-items:center;gap:4px;flex:1;min-width:0;flex-wrap:wrap}
.fp-pill{
  font-size:10px;padding:2px 7px;border-radius:4px;
  font-family:var(--mono);white-space:nowrap;
  border:1px solid transparent;
}
.fp-arrow{color:var(--text-3);font-size:10px}
.fp-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto}
.fp-cnt{font-size:11px;color:var(--text-2);font-family:var(--mono);flex-shrink:0;text-align:right;white-space:nowrap}
.fp-cnt b{color:var(--text);font-weight:600}
.fp-len{font-size:10px;color:var(--text-3);font-family:var(--mono);flex-shrink:0;white-space:nowrap;min-width:60px;text-align:right}
.fp-bar{height:4px;background:var(--border);border-radius:2px;width:80px;flex-shrink:0}
.fp-bar-fg{height:100%;background:var(--accent);border-radius:2px;min-width:2px}
.fp-more-pill{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:var(--card-2);color:var(--text-3);
  border:1px dashed var(--border);font-family:var(--mono);
  white-space:nowrap;font-style:italic;
}
.fp-toggle{font-size:9px;color:var(--text-3);transition:transform .15s ease;width:10px;flex-shrink:0}
.fp-row.open .fp-toggle{transform:rotate(90deg);color:var(--accent)}
.fp-drawer{
  padding:6px 14px 10px;background:var(--card-2);
  display:none;
}
.fp-row.open .fp-drawer{display:block}
.fp-drawer-h{
  font-size:10px;color:var(--text-3);text-transform:uppercase;
  letter-spacing:.6px;margin:4px 0 6px;font-weight:600;
}
.fp-mini-sess{
  background:var(--card);border:1px solid var(--border-soft);
  border-radius:6px;margin-bottom:6px;padding:6px 10px;
}
.fp-mini-sess:last-child{margin-bottom:0}
.fp-mini-head{
  font-size:11px;color:var(--text-2);font-family:var(--mono);
  margin-bottom:5px;padding-bottom:4px;
  border-bottom:1px solid var(--border-soft);

}
.fp-mini-head b{color:var(--text);font-weight:600}
.fp-mini-jump{
  margin-left:auto;font-size:10px;color:var(--accent);
  background:none;border:none;cursor:pointer;
  font-family:inherit;text-decoration:underline;text-underline-offset:2px;
}
.fp-empty{color:var(--text-3);padding:20px;text-align:center;font-size:12px}
</style>
</head>

<script type="application/json" id="USERLENS_DATA">/*__USERLENS_DATA__*/</script>
<script type="application/json" id="USERLENS_META">/*__USERLENS_META__*/</script>
<script>
(function(){
'use strict';

const DATA = JSON.parse(document.getElementById('USERLENS_DATA').textContent);
const META = JSON.parse(document.getElementById('USERLENS_META').textContent);

/* ── state ── */
let selUid=null, searchQ='', sortBy='events';
const activeFilters={}, _tlHidden={};
let _tlHiddenIdx=0;
let timeFilter=null;           // {from:Date,to:Date} or null
let activePreset='all';
const hiddenEvents=new Set();  // event names hidden from heatmap
let highlightEvent=null;       // event name highlighted (soft — no filtering)
let chipColorMap={};
let tlSearchQ='';

/* ── theme: light default ── */
let dark = false;
function applyTheme(){
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  document.getElementById('icon-sun').style.display = dark ? '' : 'none';
  document.getElementById('icon-moon').style.display = dark ? 'none' : '';
  // re-render the active user's visuals — cell colors / chart bg depend on theme
  if(selUid){
    const u=DATA.find(x=>x.u===selUid);
    if(u){renderHeatmap(u);renderSessions(u);}
  }
}
applyTheme();
document.getElementById('theme-btn').addEventListener('click',()=>{dark=!dark;applyTheme();});

/* ── utils ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pairs(a){const r=[];for(let i=0;i+1<a.length;i+=2)r.push([a[i],a[i+1]]);return r;}
function hex2rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a.toFixed(2)})`;}

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun']; // ISO order

function relDate(ts){
  const d=Math.floor((Date.now()-new Date(ts.replace(' ','T')))/86400000);
  if(d<0) return '';
  if(d===0) return 'today';
  if(d===1) return 'yesterday';
  if(d<7) return d+'d ago';
  if(d<30) return Math.floor(d/7)+'w ago';
  if(d<365) return Math.floor(d/30)+'mo ago';
  return Math.floor(d/365)+'y ago';
}

function sessDur(evs){
  if(!evs||evs.length<2) return '';
  const m=sessDurMin(evs);
  if(!m) return '';
  return m<60?m+'m':Math.floor(m/60)+'h '+(m%60)+'m';
}
function sessDurMin(evs){
  if(!evs||evs.length<2) return 0;
  const [fh,fm]=evs[0][0].split(':').map(Number);
  const [lh,lm]=evs[evs.length-1][0].split(':').map(Number);
  let m=(lh*60+lm)-(fh*60+fm);
  if(m<0) m+=1440;
  return m;
}

function fmtTs(ts){
  const d=new Date(ts.replace(' ','T'));
  if(isNaN(d)) return {date:ts.slice(0,10),time:'',raw:ts.slice(0,10)};
  return {
    date:`${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`,
    time:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
    raw:ts.slice(0,10)
  };
}

function activeDays(u){return new Set(u.s.map(([,ts])=>ts.slice(0,10))).size;}

const maxTe=DATA.reduce((m,u)=>Math.max(m,u.te),1);
const ATTR_KEYS=(META.attributes||[]).map(a=>a.key).slice(0,2);

/* ── feature derivation (universal client-side coloring) ── */
const HUE_PALETTE=[220,278,160,28,338,200,52,108,310,12,250,182];
function featurePalette(idx){
  const h=HUE_PALETTE[idx%HUE_PALETTE.length];
  return {
    color:`hsl(${h} 60% 52%)`,
    bg:`hsla(${h} 65% 55% / .14)`,
    fg:`hsl(${h} 60% 38%)`,
    bgDark:`hsla(${h} 65% 60% / .18)`,
    fgDark:`hsl(${h} 65% 78%)`,
    border:`hsla(${h} 60% 52% / .45)`,
  };
}
function splitPrefix(name){
  const parts=String(name).split(/[._:\-\s/]/);
  if(parts.length<2) return null;
  const p=parts[0];
  return p.length>=2?p:null;
}
function deriveFeatures(){
  // Aggregate event-name counts from META.topEvents (server-provided ranked list)
  const counts={}; const allNames=new Set();
  (META.topEvents||[]).forEach(e=>{counts[e.name]=(counts[e.name]||0)+e.count; allNames.add(e.name);});
  // Top up by scanning DATA for names that aren't in topEvents
  DATA.forEach(u=>u.s.forEach(([,,evs])=>evs.forEach(([,n])=>{
    if(!(n in counts)) counts[n]=0;
    counts[n]++;
    allNames.add(n);
  })));
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const groups={};
  for(const name of allNames){
    const p=splitPrefix(name);
    if(!p) continue;
    if(!groups[p]) groups[p]={events:new Set(),total:0};
    groups[p].events.add(name);
    groups[p].total+=counts[name]||0;
  }
  const kept=Object.entries(groups)
    .filter(([,g])=>g.events.size>=2 && g.total/total>=0.005)
    .sort((a,b)=>b[1].total-a[1].total)
    .slice(0,11);
  // If prefix grouping produced too little coverage, fall back to META.families verb-based
  const coverage=kept.reduce((s,[,g])=>s+g.total,0)/total;
  const useFeatures = kept.length>=2 && coverage>=0.3;
  const byEvent={}; const registry={};
  if(useFeatures){
    kept.forEach(([prefix],i)=>{
      const pal=featurePalette(i);
      registry[prefix]=pal;
      groups[prefix].events.forEach(n=>{byEvent[n]=prefix;});
    });
    registry['other']=featurePalette(kept.length);
  }else{
    // Use server families verbatim
    Object.entries(META.families||{}).forEach(([fam,v])=>{
      registry[fam]={color:v.color,bg:v.bg,fg:v.fg,bgDark:v.bg,fgDark:v.fg,border:(v.color||'#999')+'55'};
    });
    (META.topEvents||[]).forEach(e=>{byEvent[e.name]=e.family||'other';});
    if(!registry['other']) registry['other']={color:'#888',bg:'#eee',fg:'#444',bgDark:'#333',fgDark:'#bbb',border:'#88888855'};
  }
  return {byEvent,registry,useFeatures};
}
const FEATURES=deriveFeatures();
function famOf(name){return FEATURES.byEvent[name]||'other';}

/* ── inject feature CSS (theme-aware) ── */
const featureStyle=document.createElement('style');
const featureStyleParts=[];
Object.entries(FEATURES.registry).forEach(([f,v])=>{
  const safe=CSS.escape(f);
  featureStyleParts.push(
    `[data-theme=light] .fam-${safe}{background:${v.bg};color:${v.fg};border-color:${v.border}}`,
    `[data-theme=dark] .fam-${safe}{background:${v.bgDark};color:${v.fgDark};border-color:${v.border}}`
  );
});
featureStyle.textContent=featureStyleParts.join('\n');
document.head.appendChild(featureStyle);

function featureColor(f){return (FEATURES.registry[f]||FEATURES.registry['other']||{color:'#5E6AD2'}).color;}

/* ── filters ── */
const filtersDiv=document.getElementById('filters');
(META.attributes||[]).forEach(attr=>{
  const row=document.createElement('div'); row.className='filter-row';
  const lbl=document.createElement('span'); lbl.className='filter-lbl';
  lbl.textContent=attr.key.replace('user_','');
  const sel=document.createElement('select'); sel.className='filter-sel'; sel.dataset.key=attr.key;
  sel.innerHTML=`<option value="">all</option>`+attr.values.map(v=>`<option>${esc(v)}</option>`).join('');
  sel.addEventListener('change',()=>{
    if(sel.value) activeFilters[attr.key]=sel.value; else delete activeFilters[attr.key];
    renderChips(); renderList();
  });
  row.append(lbl,sel); filtersDiv.appendChild(row);
});

function renderChips(){
  const el=document.getElementById('active-chips');
  el.innerHTML=Object.entries(activeFilters).map(([k,v])=>
    `<button class="achip-filter" data-key="${esc(k)}"><span>${esc(k.replace('user_',''))}: ${esc(v)}</span><span class="achip-x">×</span></button>`
  ).join('');
  el.querySelectorAll('.achip-filter').forEach(btn=>btn.addEventListener('click',()=>{
    const k=btn.dataset.key; delete activeFilters[k];
    const s=filtersDiv.querySelector(`[data-key="${CSS.escape(k)}"]`); if(s) s.value='';
    renderChips(); renderList();
  }));
}

document.getElementById('sort-sel').addEventListener('change',e=>{sortBy=e.target.value;renderList();});

/* ── user list ── */
function visible(){
  return DATA.filter(u=>{
    if(searchQ&&!u.u.toLowerCase().includes(searchQ)) return false;
    for(const[k,v]of Object.entries(activeFilters)) if((u.attrs[k]||'')!==v) return false;
    return true;
  }).slice().sort((a,b)=>{
    if(sortBy==='last_seen') return (b.ls||'').localeCompare(a.ls||'');
    if(sortBy==='first_seen') return (a.fs||'').localeCompare(b.fs||'');
    if(sortBy==='sessions') return b.sn-a.sn;
    return b.te-a.te;
  });
}

function renderList(){
  const users=visible();
  const tot=DATA.reduce((s,u)=>s+u.te,0);
  document.getElementById('sb-count').textContent=`${users.length}/${DATA.length} users`;
  document.getElementById('sb-events').textContent=tot.toLocaleString()+' events';
  const listEl=document.getElementById('user-list');
  listEl.innerHTML=users.map(u=>{
    const attrs=ATTR_KEYS.filter(k=>u.attrs[k]).map(k=>`<span class="uattr">${esc(u.attrs[k])}</span>`).join('');
    return `<div class="urow${u.u===selUid?' sel':''}" data-uid="${esc(u.u)}">
      <div class="uid">${esc(u.u)}</div>
      <div class="umeta">${u.te.toLocaleString()} ev · ${u.sn} sess</div>
      ${attrs?`<div class="uattrs">${attrs}</div>`:''}
      <div class="ibar"><div class="ibar-fill" style="width:${Math.max(2,Math.round(u.te/maxTe*100))}%"></div></div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('.urow').forEach(el=>el.addEventListener('click',()=>selectUser(el.dataset.uid)));
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  const users=visible(); if(!users.length) return;
  const idx=users.findIndex(u=>u.u===selUid);
  if(e.key==='ArrowDown'){e.preventDefault();selectUser(users[Math.min(idx+1,users.length-1)].u);}
  else if(e.key==='ArrowUp'){e.preventDefault();selectUser(users[Math.max(idx-1,0)].u);}
  else if(e.key==='/'){e.preventDefault();searchEl.focus();}
});

/* ── filtered view (time range + hidden + solo) ── */
function parseTs(ts){return new Date(ts.replace(' ','T')).getTime();}
function getFilteredView(u){
  const fr=timeFilter && timeFilter.from ? timeFilter.from.getTime() : null;
  const toMs=timeFilter && timeFilter.to ? timeFilter.to.getTime()+86400000-1 : null;
  let totalAll=0,kept=0;
  const sessions=[];
  for(const[sid,ts,evs]of u.s){
    const sessTime=parseTs(ts);
    const inRange=(fr===null||sessTime>=fr)&&(toMs===null||sessTime<=toMs);
    totalAll+=evs.length;
    if(!inRange) continue;
    const fevs=[];
    for(const ev of evs){
      const name=ev[1];
      if(hiddenEvents.has(name)) continue;
      fevs.push(ev);
    }
    kept+=fevs.length;
    if(fevs.length) sessions.push([sid,ts,fevs]);
  }
  return {sessions,totalAll,kept};
}

}

/* ── time range filter ── */
document.getElementById('range-presets').addEventListener('click',e=>{
  const btn=e.target.closest('.range-btn'); if(!btn) return;
  const r=btn.dataset.r;
  activePreset=r;
  const u=DATA.find(x=>x.u===selUid); if(!u) return;

    timeFilter=null;

    document.getElementById('range-from').value=fmtDateInput(fromD);
    document.getElementById('range-to').value=fmtDateInput(toD);
  }else{
    const days=parseInt(r,10);
    const lastTs=parseTs(u.ls);
    const from=new Date(lastTs-days*86400000);
    const to=new Date(lastTs);
    timeFilter={from:new Date(from.getFullYear(),from.getMonth(),from.getDate()),to:new Date(to.getFullYear(),to.getMonth(),to.getDate())};
  }

    document.getElementById('range-from').value=fmtDateInput(timeFilter.from);

function fmtDateInput(d){return d.toISOString().slice(0,10);}
function syncRangeButtons(){

/* ── heatmap + event-name chips ── */
function renderHeatmap(u){
  const container=document.getElementById('hm-container');
  const v=getFilteredView(u);
  const dd={};
  v.sessions.forEach(([,ts,evs])=>{
    const d=ts.slice(0,10);
    if(!dd[d]) dd[d]={total:0,fc:{},ec:{}};
    evs.forEach(([,name])=>{
      if(highlightEvent && name!==highlightEvent) return; // filter heatmap to highlighted event
      const fam=famOf(name);
      dd[d].total++;
      dd[d].fc[fam]=(dd[d].fc[fam]||0)+1;
      if(!dd[d].ec[name]) dd[d].ec[name]={fam,cnt:0};
      dd[d].ec[name].cnt++;
    });
  });
  Object.values(dd).forEach(day=>{
    day.dom=Object.entries(day.fc).sort((a,b)=>b[1]-a[1])[0]?.[0]||'other';
    const topEv=Object.entries(day.ec).sort((a,b)=>b[1].cnt-a[1].cnt)[0];
    day.top1=topEv?topEv[0]:null;
    day.top=Object.entries(day.ec).map(([n,i])=>({name:n,fam:i.fam,cnt:i.cnt})).sort((a,b)=>b.cnt-a.cnt).slice(0,8);
  });
  const days=Object.keys(dd).sort();
  // event-chip strip uses full-event taxonomy of the visible (time-range-filtered) view
  renderEventChips(u);
  document.getElementById('hm-mode').innerHTML = highlightEvent ? `highlighting: <b>${esc(highlightEvent)}</b>` : (hiddenEvents.size?`<b>${hiddenEvents.size}</b> hidden`:``);
  if(!days.length){container.innerHTML='<p class="hm-empty">No activity in this range</p>';return;}
  const maxC=Math.max(...Object.values(dd).map(d=>d.total),1);
  const t0=new Date(days[0]+'T12:00:00'), t1=new Date(days[days.length-1]+'T12:00:00');
  const start=new Date(t0); start.setDate(start.getDate()-start.getDay());
  const end=new Date(t1); end.setDate(end.getDate()+(6-end.getDay()));
  const C=12,G=3,OX=40,OY=26, weeks=[];
  const cur=new Date(start);
  while(cur<=end){
    const w=[];
    for(let d=0;d<7;d++){
      const k=cur.toISOString().slice(0,10), i=dd[k];
      w.push({date:k,total:i?i.total:0,dom:i?i.dom:null,top1:i?i.top1:null});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(w);
  }
  function fill(total,dom,top1){
    if(!total) return getComputedStyle(document.documentElement).getPropertyValue('--empty-cell').trim()||(dark?'#1a1a20':'#eaeaee');
    const alpha=(0.20+0.80*Math.pow(total/maxC,0.55)).toFixed(2);
    const c=chipColorMap[top1]||featureColor(dom||'other');
    return c.replace('hsl(','hsla(').replace(')',` / ${alpha})`);
  }
  let lastM=-1, lastWi=-100;
  const axisColor=dark?'#6e6e7a':'#8e8e9c';
  const textColor=dark?'#e6e6ea':'#15151a';
  const ml=weeks.map((w,wi)=>{
    const m=new Date(w[0].date+'T12:00:00').getMonth();
    if(m===lastM || wi-lastWi<3) return '';
    lastM=m; lastWi=wi;
    return `<text x="${OX+wi*(C+G)}" y="17" fill="${textColor}" font-size="12" font-weight="600" font-family="-apple-system,system-ui,Helvetica,sans-serif">${MONTHS[m]}</text>`;
  }).join('');
  const DAYLABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dl=DAYLABELS.map((l,i)=>
    `<text x="${OX-6}" y="${OY+i*(C+G)+C-2}" fill="${axisColor}" font-size="9" text-anchor="end" font-family="-apple-system,system-ui,Helvetica,sans-serif">${l}</text>`
  ).join('');
  const cells=weeks.map((w,wi)=>w.map(({date,total,dom,top1},di)=>
    `<rect x="${OX+wi*(C+G)}" y="${OY+di*(C+G)}" width="${C}" height="${C}" rx="2" fill="${fill(total,dom,top1)}" data-date="${date}" style="cursor:${total?'pointer':'default'}"/>`
  ).join('')).join('');
  const W=OX+weeks.length*(C+G)+4, H=OY+7*(C+G)+4;
  container.innerHTML=`<div class="hm-wrap"><svg id="hm-svg" width="${W}" height="${H}" style="display:block">${ml}${dl}${cells}</svg></div>`;

  const svg=document.getElementById('hm-svg');
  let tipTgt=null;
  svg.addEventListener('mouseover',e=>{
    const r=e.target.closest?.('rect[data-date]'); if(!r||r===tipTgt) return; tipTgt=r;
    const info=dd[r.dataset.date]; if(!info||!info.total){tipHide();return;}
    const dp=r.dataset.date.split('-');
    const date=r.dataset.date;
    const evRows=info.top.map(({name,fam,cnt})=>{
      const c=chipColorMap[name]||featureColor(fam);
      return `<button class="tip-row tip-evbtn" data-date="${esc(date)}" data-name="${esc(name)}"><span class="tip-pill" style="background:${c.replace('hsl(','hsla(').replace(')',' / 0.18)')};color:${c};border-color:${c.replace('hsl(','hsla(').replace(')',' / 0.5)')}">${esc(fam)}</span><span class="tip-name">${esc(name)}</span><span class="tip-cnt">${cnt}</span></button>`;
    }).join('');
    tipShow(`<div class="tip-h">${MONTHS[parseInt(dp[1])-1]} ${parseInt(dp[2])}, ${dp[0]}</div><div class="tip-sub">${info.total} event${info.total!==1?'s':''}</div>${evRows}<div class="tip-hint">click an event to jump to it</div>`);
  });
  svg.addEventListener('mousemove',tipMove);
  svg.addEventListener('mouseleave',()=>{tipDelayHide();tipTgt=null;});
  svg.addEventListener('click',e=>{
    const r=e.target.closest?.('rect[data-date]'); if(!r||!dd[r.dataset.date]) return;
    tipHide();
    jumpToSessionDate(r.dataset.date);
  });
}

function renderEventChips(u){
  const v=getFilteredView(u);
  const counts={};
  v.sessions.forEach(([,,evs])=>evs.forEach(([,name])=>counts[name]=(counts[name]||0)+1));
  // Always include hidden + solo in the candidate set so user can manage them
  hiddenEvents.forEach(n=>{if(!(n in counts)) counts[n]=0;});
  if(highlightEvent && !(highlightEvent in counts)) counts[highlightEvent]=0;
  const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  chipColorMap={};
  ranked.slice(0,9).forEach(([n],i)=>{chipColorMap[n]=`hsl(${HUE_PALETTE[i]} 60% 52%)`;});
  const TOP=9;
  const shown=ranked.slice(0,TOP);
  const rest=ranked.slice(TOP);
  const otherCnt=rest.reduce((s,[,c])=>s+c,0);
  const el=document.getElementById('evchips');
  const items=shown.map(([n,c])=>{
    const color=chipColorMap[n]||featureColor(famOf(n));
    const isSolo=highlightEvent===n;
    const isHidden=hiddenEvents.has(n);
    if(isHidden) return '';
    return `<span class="evchip${isSolo?' solo':''}" data-name="${esc(n)}"><span class="evchip-sw" style="background:${color}"></span>${esc(n)}<span class="evchip-cnt">${c}</span><span class="evchip-x" data-x="${esc(n)}" title="hide">×</span></span>`;
  }).filter(Boolean).join('');
  let restHtml='';
  if(otherCnt>0){
    restHtml=`<span class="evchip" data-name="__other__" title="${esc(rest.map(([n])=>n).join(', '))}"><span class="evchip-sw" style="background:${featureColor('other')}"></span>Other<span class="evchip-cnt">${otherCnt}</span></span>`;
  }
  const restoreBtn = hiddenEvents.size ? `<button class="evchip-restore" id="evchip-restore">↺ show ${hiddenEvents.size} hidden</button>` : '';
  const clearSolo = highlightEvent ? `<button class="evchip-restore" id="evchip-clear-solo">clear highlight</button>` : '';
  el.innerHTML = items + restHtml + restoreBtn + clearSolo;

  el.querySelectorAll('.evchip').forEach(chip=>{
    chip.addEventListener('click',e=>{
      if(e.target.closest('.evchip-x')) return;
      const n=chip.dataset.name;
      if(n==='__other__') return;
      // toggle highlight
      highlightEvent = highlightEvent===n ? null : n;
      const u=DATA.find(x=>x.u===selUid); if(u) rerenderAll(u);
    });
  });
  el.querySelectorAll('.evchip-x').forEach(x=>{
    x.addEventListener('click',e=>{
      e.stopPropagation();
      const n=x.dataset.x;
      hiddenEvents.add(n);
      if(highlightEvent===n) highlightEvent=null;
      const u=DATA.find(x=>x.u===selUid); if(u) rerenderAll(u);
    });
  });
  const rb=document.getElementById('evchip-restore');
  if(rb) rb.addEventListener('click',()=>{
    hiddenEvents.clear();
    const u=DATA.find(x=>x.u===selUid); if(u) rerenderAll(u);
  });
  const cs=document.getElementById('evchip-clear-solo');
  if(cs) cs.addEventListener('click',()=>{
    highlightEvent=null;
    const u=DATA.find(x=>x.u===selUid); if(u) rerenderAll(u);
  });
}

/* ── timeline ── */
const TL_CAP=500;

function renderEventRow(ev,sid,evIdx){
  const[hhmm,name,_legacyFam,...props]=ev;
  const fam=famOf(name);
  const ph=pairs(props).map(([k,v])=>`<span class="eprop">${esc(k)}=${esc(v)}</span>`).join('');
  return `<div class="erow" data-event="${esc(name)}" data-sid="${esc(sid)}" data-i="${evIdx}"><span class="etime">${esc(hhmm)}</span><span class="ename fam-${CSS.escape(fam)}">${esc(name)}</span>${ph?`<span class="eprops">${ph}</span>`:''}</div>`;
}

document.addEventListener('click',e=>{
  const btn=e.target.closest('.tl-more-btn'); if(!btn) return;
  const key=btn.dataset.key, html=_tlHidden[key]||''; delete _tlHidden[key];
  const more=btn.closest('.tl-more');
  more.previousElementSibling.insertAdjacentHTML('beforeend',html);
  more.remove();
});

function computeMedianDur(sessions){
  const arr=sessions.map(([,,evs])=>sessDurMin(evs)).filter(m=>m>0).sort((a,b)=>a-b);
  if(!arr.length) return 0;
  return arr[Math.floor(arr.length/2)];
}
function sessionBadges(evs,medianDur){
  const out=[];
  if(evs.some(([,_n,fam])=>fam==='error') || evs.some(([,n])=>famOf(n)==='error')){
    out.push(`<span class="sess-badge-mk" data-kind="err" title="contains error event">●</span>`);
  }
  const m=sessDurMin(evs);
  if(medianDur>0 && m>medianDur*2 && m>=5){
    out.push(`<span class="sess-badge-mk" data-kind="long" title="long session (>2× median)">⚡</span>`);
  }
  // 5+ same-event in a row
  let cur='',run=0,maxRun=0,runEv='';
  for(const ev of evs){
    if(ev[1]===cur){run++;}else{cur=ev[1];run=1;}
    if(run>maxRun){maxRun=run;runEv=cur;}
  }
  if(maxRun>=5){
    out.push(`<span class="sess-badge-mk" data-kind="loop" title="${esc(runEv)} repeated ${maxRun} times">⟳</span>`);
  }
  return out.join('');
}

function renderTimeline(u){
  const v=getFilteredView(u);
  const medianDur=computeMedianDur(v.sessions);
  const total=v.sessions.reduce((n,[,,evs])=>n+evs.length,0);
  let rendered=0, si=0;
  const html=v.sessions.map(([sid,ts,evs])=>{
    if(rendered>=TL_CAP) return '';
    const canShow=Math.max(0,TL_CAP-rendered);
    const vis=evs.slice(0,canShow), hid=evs.slice(canShow);
    rendered+=vis.length;
    const fmt=fmtTs(ts), dur=sessDur(evs);
    const isOpen=si++<3;
    let hidHtml='';
    if(hid.length){
      const key='tlh'+(++_tlHiddenIdx);
      _tlHidden[key]=hid.map((ev,i)=>renderEventRow(ev,sid,vis.length+i)).join('');
      hidHtml=`<div class="tl-more"><button class="tl-more-btn" data-key="${key}">↓ show ${hid.length} more</button></div>`;
    }
    const badges=sessionBadges(evs,medianDur);
    return `<details class="sess"${isOpen?' open':''} data-sid="${esc(sid)}">
      <summary>
        <span class="sess-arrow">▶</span>
        <span class="sess-date" data-rawdate="${esc(fmt.raw)}">${esc(fmt.date)}</span>
        <span class="sess-time">${esc(fmt.time)}</span>
        ${dur?`<span class="sess-dur">${dur}</span>`:''}
        ${badges?`<span class="sess-badges">${badges}</span>`:''}
        <span class="sess-badge">${evs.length} ev</span>
      </summary>
      <div class="sess-body">${vis.map((ev,i)=>renderEventRow(ev,sid,i)).join('')}</div>${hidHtml}
    </details>`;
  }).join('');
  const cap=total>TL_CAP?`<div class="tl-cap-note">showing first ${TL_CAP} of ${total.toLocaleString()} events</div>`:'';
  const toolbar=`<div class="tl-toolbar">
    <div class="tl-search-wrap">
      <svg class="tl-search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="tl-search" id="tl-search" type="search" placeholder="search events…" value="${esc(tlSearchQ)}" autocomplete="off">
    </div>
    <span class="tl-search-stats" id="tl-search-stats"></span>
  </div>`;
  document.getElementById('pane-tl').innerHTML=toolbar+cap+html;
  const inp=document.getElementById('tl-search');
  if(inp){
    inp.addEventListener('input',e=>{tlSearchQ=e.target.value;applyTlSearch();});
    inp.addEventListener('keydown',e=>{if(e.key==='Escape'){tlSearchQ='';inp.value='';applyTlSearch();}});
  }
  applyTlSearch();
  applyTlHighlight();
}

function applyTlSearch(){
  const stats=document.getElementById('tl-search-stats');
  const rows=document.querySelectorAll('#pane-tl .erow');
  if(!tlSearchQ.trim()){
    rows.forEach(r=>{r.classList.remove('match','dim');});
    if(stats) stats.textContent='';
    return;
  }
  const q=tlSearchQ.toLowerCase();
  let n=0;
  rows.forEach(r=>{
    const text=r.textContent.toLowerCase();
    if(text.includes(q)){r.classList.add('match');r.classList.remove('dim');n++;}
    else{r.classList.remove('match');r.classList.add('dim');}
  });
  // expand sessions containing matches
  document.querySelectorAll('#pane-tl details.sess').forEach(d=>{
    if(d.querySelector('.erow.match')) d.open=true;
  });
  if(stats) stats.textContent=`${n} match${n===1?'':'es'}`;
}

/* ── top events ── */
function renderTopEvents(u){
  const v=getFilteredView(u);

  v.sessions.forEach(([,,evs])=>evs.forEach(([,n])=>counts[n]=(counts[n]||0)+1));

    <thead><tr><th>Event</th><th>Feature</th><th>Count</th><th>%</th></tr></thead>
    <tbody>${rows.map(([n,cnt])=>{
      const fam=famOf(n), pct=Math.round(cnt/totalE*100);
      return `<tr><td><code>${esc(n)}</code></td>
        <td><span class="fampill fam-${CSS.escape(fam)}">${esc(fam)}</span></td>
        <td><div class="barwrap"><div class="barbg"><div class="barfg" style="width:${Math.round(cnt/maxC*100)}%"></div></div><span class="barnum">${cnt}</span></div></td>
        <td><span class="barpct">${pct}%</span></td></tr>`;
    }).join('')}</tbody></table>`;

/* ── Sessions tab — DoW×Hour + trend + duration histogram ── */
function renderSessions(u){
  const container=document.getElementById('pane-rb');
  const v=getFilteredView(u);
  if(!v.sessions.length){container.innerHTML='<div class="sx-card sx-empty">No session data in this range</div>';return;}

  // ── DoW × Hour matrix ──
  const grid=Array.from({length:7},()=>Array(24).fill(null).map(()=>({n:0,fams:{},durs:[]})));
  v.sessions.forEach(([,ts,evs])=>{
    const d=new Date(ts.replace(' ','T'));
    if(isNaN(d)) return;
    const dow=(d.getDay()+6)%7; // 0=Mon
    const hr=d.getHours();
    const cell=grid[dow][hr];
    cell.n++;
    cell.durs.push(sessDurMin(evs));
    const fc={};
    evs.forEach(([,n])=>{const f=famOf(n);fc[f]=(fc[f]||0)+1;});
    const dom=Object.entries(fc).sort((a,b)=>b[1]-a[1])[0]?.[0]||'other';
    cell.fams[dom]=(cell.fams[dom]||0)+1;
  });
  let maxCell=0;
  grid.forEach(r=>r.forEach(c=>{if(c.n>maxCell)maxCell=c.n;}));
  if(maxCell<1) maxCell=1;
  const emptyCellColor=getComputedStyle(document.documentElement).getPropertyValue('--empty-cell').trim()||(dark?'#1a1a20':'#eaeaee');
  function cellFill(c){
    if(!c.n) return emptyCellColor;
    const dom=Object.entries(c.fams).sort((a,b)=>b[1]-a[1])[0]?.[0]||'other';
    const hsl=featureColor(dom);
    return hsl.replace('hsl(','hsla(').replace(')',` / ${(0.22+0.78*Math.pow(c.n/maxCell,0.55)).toFixed(2)})`);
  }
  function avgDur(c){if(!c.durs.length)return 0;return Math.round(c.durs.reduce((a,b)=>a+b,0)/c.durs.length);}
  const axisCells=Array.from({length:24},(_,h)=>`<div class="sx-dow-axis-cell">${(h%6===0)?h:''}</div>`).join('');
  const dowHtml=DOW.map((lbl,di)=>{
    const cells=grid[di].map((c,hi)=>{
      const fill=cellFill(c);
      const attrs = c.n ? `data-cnt="${c.n}" data-dow="${di}" data-hr="${hi}"` : '';
      return `<div class="sx-dow-cell" style="background:${fill}" ${attrs}></div>`;
    }).join('');
    return `<div class="sx-dow-row"><span class="sx-dow-lbl">${lbl}</span><div class="sx-dow-cells">${cells}</div></div>`;
  }).join('');
  const dowCard=`<div class="sx-card">
    <div class="sx-h"><span class="sx-title">When this user is active</span><span class="sx-sub">${v.sessions.length} session${v.sessions.length!==1?'s':''} · hour-of-day × day-of-week</span></div>
    <div class="sx-dow-wrap">
      <div class="sx-dow-axis"><div style="display:flex">${axisCells}</div></div>
      ${dowHtml}
    </div>
  </div>`;

  // ── Trend line: sessions per week ──
  const weeks={};
  v.sessions.forEach(([,ts])=>{
    const d=new Date(ts.replace(' ','T'));
    if(isNaN(d)) return;
    const day=(d.getDay()+6)%7;
    const wkStart=new Date(d.getFullYear(),d.getMonth(),d.getDate()-day);
    const k=wkStart.toISOString().slice(0,10);
    weeks[k]=(weeks[k]||0)+1;
  });
  // Fill in zero weeks between min and max
  const wkeys=Object.keys(weeks).sort();
  let trendHtml='';
  if(wkeys.length){
    const first=new Date(wkeys[0]), last=new Date(wkeys[wkeys.length-1]);
    const pts=[];
    for(let d=new Date(first); d<=last; d.setDate(d.getDate()+7)){
      const k=d.toISOString().slice(0,10);
      pts.push({k,n:weeks[k]||0});
    }
    if(pts.length===1) pts.push({k:pts[0].k,n:pts[0].n});
    const W=320,H=110,PX=28,PY=12,IW=W-PX-6,IH=H-PY-22;
    const maxN=Math.max(...pts.map(p=>p.n),1);
    const xAt=i=>PX+(pts.length<=1?IW/2:i*(IW/(pts.length-1)));
    const yAt=n=>PY+IH-(n/maxN)*IH;
    const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${xAt(i).toFixed(1)} ${yAt(p.n).toFixed(1)}`).join(' ');
    const areaD=pathD+` L${xAt(pts.length-1).toFixed(1)} ${(PY+IH).toFixed(1)} L${xAt(0).toFixed(1)} ${(PY+IH).toFixed(1)} Z`;
    const dots=pts.map((p,i)=>`<circle class="sx-trend-dot" cx="${xAt(i).toFixed(1)}" cy="${yAt(p.n).toFixed(1)}" r="2.5" data-wk="${p.k}" data-n="${p.n}"/>`).join('');
    const yticks=[0,Math.ceil(maxN/2),maxN];
    const grid=yticks.map(t=>`<line class="sx-trend-grid" x1="${PX}" y1="${yAt(t).toFixed(1)}" x2="${W-6}" y2="${yAt(t).toFixed(1)}"/>`).join('');
    const yLbls=yticks.map(t=>`<text class="sx-trend-axis" x="${PX-4}" y="${(yAt(t)+3).toFixed(1)}" text-anchor="end">${t}</text>`).join('');
    const firstD=new Date(pts[0].k), lastD=new Date(pts[pts.length-1].k);
    const xLbls=`<text class="sx-trend-axis" x="${PX}" y="${H-4}">${MONTHS[firstD.getMonth()]} ${firstD.getDate()}</text><text class="sx-trend-axis" x="${W-6}" y="${H-4}" text-anchor="end">${MONTHS[lastD.getMonth()]} ${lastD.getDate()}</text>`;
    trendHtml=`<div class="sx-card">
      <div class="sx-h"><span class="sx-title">Sessions per week</span><span class="sx-sub">${pts.length} week${pts.length!==1?'s':''}</span></div>
      <svg class="sx-trend" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        ${grid}${yLbls}${xLbls}
        <path class="sx-trend-area" d="${areaD}"/>
        <path class="sx-trend-line" d="${pathD}"/>
        ${dots}
      </svg>
    </div>`;
  }

  // ── Duration histogram ──
  const buckets=[
    {lbl:'<1m',lo:0,hi:1,n:0},
    {lbl:'1–5m',lo:1,hi:5,n:0},
    {lbl:'5–15m',lo:5,hi:15,n:0},
    {lbl:'15–30m',lo:15,hi:30,n:0},
    {lbl:'30–60m',lo:30,hi:60,n:0},
    {lbl:'1h+',lo:60,hi:Infinity,n:0},
  ];
  const durs=v.sessions.map(([,,e])=>sessDurMin(e));
  durs.forEach(m=>{const b=buckets.find(b=>m>=b.lo && m<b.hi); if(b)b.n++;});
  const maxB=Math.max(...buckets.map(b=>b.n),1);
  const sortedDur=durs.slice().sort((a,b)=>a-b);
  const avg=sortedDur.length?Math.round(sortedDur.reduce((a,b)=>a+b,0)/sortedDur.length):0;
  const p50=sortedDur.length?sortedDur[Math.floor(sortedDur.length/2)]:0;
  const p90=sortedDur.length?sortedDur[Math.floor(sortedDur.length*0.9)]:0;
  function fmtMin(m){if(m<60)return m+'m';return Math.floor(m/60)+'h '+(m%60)+'m';}
  const histRows=buckets.map(b=>`<div class="sx-hist-row"><span class="sx-hist-lbl">${b.lbl}</span><div class="sx-hist-bar"><div class="sx-hist-fg" style="width:${Math.round(b.n/maxB*100)}%"></div></div><span class="sx-hist-cnt">${b.n}</span></div>`).join('');
  const histHtml=`<div class="sx-card">
    <div class="sx-h"><span class="sx-title">Session duration</span><span class="sx-sub">${durs.length} session${durs.length!==1?'s':''}</span></div>
    <div class="sx-hist">${histRows}</div>
    <div class="sx-summary">avg <b>${fmtMin(avg)}</b> · p50 <b>${fmtMin(p50)}</b> · p90 <b>${fmtMin(p90)}</b></div>
  </div>`;

  container.innerHTML=`<div class="sx-grid">${dowCard}<div class="sx-stacked">${trendHtml}${histHtml}</div></div>`;

  // tooltip hooks on DoW cells
  container.querySelectorAll('.sx-dow-cell[data-cnt]').forEach(cell=>{
    cell.addEventListener('mouseenter',()=>{
      const di=+cell.dataset.dow, hi=+cell.dataset.hr;
      const c=grid[di][hi];
      tipShow(`<div class="tip-h">${DOW[di]} ${String(hi).padStart(2,'0')}:00</div><div class="tip-sub">${c.n} session${c.n!==1?'s':''} · avg ${fmtMin(avgDur(c))}</div>`);
    });
    cell.addEventListener('mousemove',tipMove);
    cell.addEventListener('mouseleave',tipDelayHide);
  });
  // tooltip on trend dots
  container.querySelectorAll('.sx-trend-dot').forEach(dot=>{
    dot.addEventListener('mouseenter',()=>{
      const d=new Date(dot.dataset.wk);
      tipShow(`<div class="tip-h">Week of ${MONTHS[d.getMonth()]} ${d.getDate()}</div><div class="tip-sub">${dot.dataset.n} session${dot.dataset.n!=='1'?'s':''}</div>`);
    });
    dot.addEventListener('mousemove',tipMove);
    dot.addEventListener('mouseleave',tipDelayHide);
  });
}

/* ── Flow tab — top session paths ── */
function renderFlow(u){
  const container=document.getElementById('pane-fl');
  const v=getFilteredView(u);
  if(!v.sessions.length){container.innerHTML='<div class="fp-empty">No sessions in range</div>';return;}

  // Compute a "shape" for each session by collapsing consecutive duplicates of the same
  // event, then compressing long shapes to head + ⋯ + tail. Sessions whose dedup'd shapes
  // match group together — this captures the high-level flow even when one user repeats
  // a step (e.g. message_sent) many times while another does it once.
  const SIG_SHORT_MAX=5, SIG_HEAD=3, SIG_TAIL=2;
  function shapeOf(evs){
    // Keep each event name only the FIRST time it appears in the session — this turns
    // a 60-event msg/resp ping-pong into the 2-element shape [msg, resp], and groups
    // sessions by the high-level flow of events they touch rather than exact sequence.
    const out=[]; const seen=new Set();
    for(const e of evs){
      const n=e[1];
      if(!seen.has(n)){ out.push(n); seen.add(n); }
    }
    return out;
  }
  function signatureOf(evs){
    const shape=shapeOf(evs);
    if(shape.length<=SIG_SHORT_MAX){
      return {names:shape, compressed:false, hiddenCount:0, shapeLen:shape.length, rawLen:evs.length};
    }
    const head=shape.slice(0,SIG_HEAD);
    const tail=shape.slice(-SIG_TAIL);
    const hidden=shape.length-SIG_HEAD-SIG_TAIL;
    return {names:[...head, null, ...tail], compressed:true, hiddenCount:hidden, shapeLen:shape.length, rawLen:evs.length};
  }
  function sigKey(sig){
    // Group by head+tail shape only; middle-step count is shown as a range, not part of the key.
    return sig.names.map(n=>n===null?'__MORE__':n).join('\x1f');
  }

  const groups={}; // key → {sig, count, sessions, min/max for hidden/raw}
  v.sessions.forEach((s,idx)=>{
    if(!s[2].length) return;
    const sig=signatureOf(s[2]);
    const k=sigKey(sig);
    if(!groups[k]){
      groups[k]={sig,count:0,sessions:[],minHidden:sig.hiddenCount,maxHidden:sig.hiddenCount,minLen:sig.rawLen,maxLen:sig.rawLen};
    }
    groups[k].count++;
    groups[k].sessions.push(idx);
    groups[k].minHidden=Math.min(groups[k].minHidden,sig.hiddenCount);
    groups[k].maxHidden=Math.max(groups[k].maxHidden,sig.hiddenCount);
    groups[k].minLen=Math.min(groups[k].minLen,sig.rawLen);
    groups[k].maxLen=Math.max(groups[k].maxLen,sig.rawLen);
  });
  const ranked=Object.values(groups).sort((a,b)=>b.count-a.count);
  if(!ranked.length){container.innerHTML='<div class="fp-empty">No session paths to analyze</div>';return;}

  const top=ranked.slice(0,12);
  const totalSess=v.sessions.length;
  const maxCnt=top[0].count;
  const topPct=Math.round(top[0].count/totalSess*100);

  function pill(name){
    const fam=famOf(name);
    return `<span class="fp-pill fam-${CSS.escape(fam)}">${esc(name)}</span>`;
  }
  function morePill(label){return `<span class="fp-more-pill">⋯ ${label}</span>`;}
  function chainHtml(g){
    const parts=[];
    const moreLabel=g.minHidden===g.maxHidden?`+${g.minHidden} step${g.minHidden!==1?'s':''}`:`+${g.minHidden}–${g.maxHidden} steps`;
    g.sig.names.forEach((n,i)=>{
      if(i>0) parts.push('<span class="fp-arrow">→</span>');
      parts.push(n===null?morePill(moreLabel):pill(n));
    });
    return parts.join('');
  }

  const rowsHtml=top.map((g,i)=>{
    const pct=Math.round(g.count/totalSess*100);
    const lenLabel=g.minLen===g.maxLen?`${g.minLen} events`:`${g.minLen}–${g.maxLen} events`;
    return `<div class="fp-row" data-idx="${i}">
      <div class="fp-row-head">
        <span class="fp-toggle">▶</span>
        <div class="fp-chain">${chainHtml(g)}</div>
        <div class="fp-meta">
          <div class="fp-bar"><div class="fp-bar-fg" style="width:${Math.round(g.count/maxCnt*100)}%"></div></div>
          <span class="fp-cnt"><b>${g.count.toLocaleString()}</b> session${g.count!==1?'s':''} · ${pct}%</span>
          <span class="fp-len">${lenLabel}</span>
        </div>
      </div>
      <div class="fp-drawer"></div>
    </div>`;
  }).join('');

  container.innerHTML=`<div class="fp-head"><b>${ranked.length.toLocaleString()}</b> distinct path${ranked.length!==1?'s':''} · top path covers <b>${topPct}%</b> of sessions · ${totalSess.toLocaleString()} session${totalSess!==1?'s':''} analyzed</div><div class="fp-panel">${rowsHtml}</div>`;

  container.querySelectorAll('.fp-row').forEach(row=>{
    const idx=+row.dataset.idx;
    const g=top[idx];
    row.querySelector('.fp-row-head').addEventListener('click',()=>{
      const wasOpen=row.classList.toggle('open');
      const drawer=row.querySelector('.fp-drawer');
      if(wasOpen&&!drawer.dataset.built){
        drawer.dataset.built='1';
        const matching=g.sessions.slice(0,3).map(i=>v.sessions[i]);
        const moreNote=`<div class="fp-drawer-h">showing ${matching.length} of ${g.count} matching session${g.count!==1?'s':''}</div>`;
        const examples=matching.map(([sid,ts,evs])=>{
          const fmt=fmtTs(ts);
          const evHtml=evs.map(ev=>renderEventRow(ev,sid,0)).join('');
          return `<div class="fp-mini-sess">
            <div class="fp-mini-head"><b>${esc(fmt.date)}</b> <span style="color:var(--text-3)">${esc(fmt.time)}</span> · <span style="color:var(--text-3)">${evs.length} events${sessDur(evs)?' · '+sessDur(evs):''}</span><button class="fp-mini-jump" data-sid="${esc(sid)}">open in timeline →</button></div>
            ${evHtml}
          </div>`;
        }).join('');
        drawer.innerHTML=moreNote+examples;
        drawer.querySelectorAll('.fp-mini-jump').forEach(b=>b.addEventListener('click',e=>{
          e.stopPropagation();jumpToSession(b.dataset.sid);
        }));
      }
    });
  });
}

/* ── Jump helpers ── */
function jumpToSessionDate(date){
  switchTab('pane-tl');
  requestAnimationFrame(()=>{
    const el=document.querySelector(`#pane-tl .sess-date[data-rawdate="${CSS.escape(date)}"]`);
    if(!el) return;
    const sess=el.closest('.sess');
    if(!sess.open) sess.open=true;
    sess.scrollIntoView({behavior:'smooth',block:'start'});
    sess.style.outline=`2px solid var(--accent)`;
    setTimeout(()=>{sess.style.outline='';},1200);
  });
}
function jumpToSession(sid){
  switchTab('pane-tl');
  requestAnimationFrame(()=>{
    const el=document.querySelector(`#pane-tl .sess[data-sid="${CSS.escape(sid)}"]`);
    if(!el) return;
    if(!el.open) el.open=true;
    el.scrollIntoView({behavior:'smooth',block:'start'});
    el.style.outline=`2px solid var(--accent)`;
    setTimeout(()=>{el.style.outline='';},1200);
  });
}
function jumpToEventInDate(date,name){
  switchTab('pane-tl');
  requestAnimationFrame(()=>{
    const dateEl=document.querySelector(`#pane-tl .sess-date[data-rawdate="${CSS.escape(date)}"]`);
    if(!dateEl){
      // Session not in render window — show brief notice on the tl-showing bar
      const bar=document.querySelector('#pane-tl .tl-showing');
      if(bar){const orig=bar.textContent; bar.textContent=`↑ Session on ${date} not in view (past 500-event cap)`; setTimeout(()=>{bar.textContent=orig;},2500);}
      return;
    }
    const sess=dateEl.closest('.sess');
    if(!sess.open) sess.open=true;
    // First erow in this session matching name
    const evRow=sess.querySelector(`.erow[data-event="${CSS.escape(name)}"]`);
    const target=evRow||sess;
    target.scrollIntoView({behavior:'smooth',block:'center'});
    if(evRow){evRow.classList.add('highlight'); setTimeout(()=>evRow.classList.remove('highlight'),1500);}
    else{sess.style.outline=`2px solid var(--accent)`; setTimeout(()=>{sess.style.outline='';},1500);}
  });
}

/* ── Tooltip helpers (with grace period for interaction) ── */
const tipEl=document.getElementById('tip');
let tipHideTimer=null;
function tipShow(html){
  if(tipHideTimer){clearTimeout(tipHideTimer);tipHideTimer=null;}
  tipEl.innerHTML=html;tipEl.style.display='block';
  // bind click on tip-evbtn lazily
  tipEl.querySelectorAll('.tip-evbtn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const d=btn.dataset.date, n=btn.dataset.name;
      tipHide(); jumpToEventInDate(d,n);
    });
  });
}
function tipHide(){tipEl.style.display='none';if(tipHideTimer){clearTimeout(tipHideTimer);tipHideTimer=null;}}
function tipDelayHide(){
  if(tipHideTimer) clearTimeout(tipHideTimer);
  tipHideTimer=setTimeout(()=>tipHide(),180);
}
tipEl.addEventListener('mouseenter',()=>{if(tipHideTimer){clearTimeout(tipHideTimer);tipHideTimer=null;}});
tipEl.addEventListener('mouseleave',()=>tipDelayHide());

function tipMove(e){
  if(tipEl.style.display==='none') return;
  const x=e.clientX+14, y=e.clientY-10;
  const tw=tipEl.offsetWidth, th=tipEl.offsetHeight;
  tipEl.style.left=(x+tw>window.innerWidth-8?e.clientX-tw-14:x)+'px';
  tipEl.style.top=(y+th>window.innerHeight-8?e.clientY-th-10:y)+'px';
}

/* ── tabs ── */
function switchTab(id){
  detailEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.pane===id));
  ['pane-tl','pane-rb','pane-fl','pane-ev'].forEach(p=>document.getElementById(p).classList.toggle('hidden',p!==id));
}
detailEl.querySelector('.tabs').addEventListener('click',e=>{
  if(e.target.classList.contains('tab')) switchTab(e.target.dataset.pane);
});

/* ── empty state stats ── */
document.getElementById('empty-stats').innerHTML=[
  [DATA.length.toLocaleString(),'Users'],
  [DATA.reduce((s,u)=>s+u.te,0).toLocaleString(),'Events'],
  [DATA.reduce((s,u)=>s+u.sn,0).toLocaleString(),'Sessions'],
].map(([v,l])=>`<div class="estat"><div class="estat-v">${v}</div><div class="estat-l">${l}</div></div>`).join('');

/* ── init ── */
renderList();
if(DATA.length>0) selectUser(DATA[0].u);

})();
</script>
